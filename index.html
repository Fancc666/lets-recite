<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>一起背吧 | FANCC</title>
    <link rel="stylesheet" href="https://cdn.happyfan.cc.cd/public/iconfont.css">
    <link rel="stylesheet" href="./assets/common.css?v2.1">
</head>

<body>
    <div class="container">
        <h2>一起背吧</h2>
        <p>选择题库->点击加载->随机题目/目录全览</p>
        <div>
            <span>题库</span>
            <select id="uSelect">
                <option value="0">--</option>
            </select>
            <button id="uLoad">加载</button>
        </div>
        <p>随机一题</p>
        <div class="box">
            <p>#<span id="qId">--</span></p>
            <p>问：<span id="question">加载中...</span></p>
            <button style="display: block;" id="uAns">查看答案</button>
            <p id="answerContainer" style="display: none;">
                答：
                <span id="answer">--</span>
            </p>
            <span class="mic" id="mic">&#xe6b8;</span>
        </div>
        <div class="lr">
            <a href="javascript:void(0)" onclick="setRandomQuestion(-1)">上一题</a>
            <a href="javascript:void(0)" onclick="setRandomQuestion(1)">下一题</a>
        </div>
        <p>目录全览</p>
        <div class="box" id="bookbox">
            <!-- <p>
                <a href="./catalog.html?book="></a>
                <span>一些介绍</span>
            </p> -->
        </div>
        <div style="margin-top: 40px;text-align: center;">
            <p>By FANCC @ Peiyang, 2026.05 v3.0.</p>
            <p><a class="normal" href="https://github.com/Fancc666/lets-recite" target="_blank"><span
                        class="icon">&#xe717;</span>lets-recite开源于Github</a></p>
        </div>
    </div>
    <script>
        document.write("<script src='./books/books.js?" + String(Math.random()).slice(2) + "'></" + "script>");
    </script>
    <script src="./assets/defa.js?v20260505"></script>
    <script src="./assets/dftts.js?v2.1"></script>
    <script>
        function report(inf) {
            if (window.location.hostname !== "localhost") {
                const s = document.createElement("script");
                s.src = "/report/?tag=defa&inf=" + inf;
                document.body.appendChild(s);
            }
        }
        report("main");
    </script>
</body>

</html>
